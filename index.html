<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patrick's Groundhopping</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <h1>Patrick's Groundhopping</h1>
    <p>Meine Fußballreisen durch Stadien in Deutschland und der Welt.</p>
</header>

<main id="posts"></main>

<footer>
    <p>© 2026 Patrick Moers</p>
</footer>

<script>
// Liste deiner Berichte
const posts = [
    {
        title: "Eintracht Frankfurt – Bayern München",
        date: "12. März 2026",
        stadium: "Deutsche Bank Park",
        file: "posts/beispielspiel.html"
    }
];

const container = document.getElementById("posts");

posts.forEach(post => {
    container.innerHTML += `
        <section>
            <h2><a href="${post.file}">${post.title}</a></h2>
            <p><strong>Datum:</strong> ${post.date}</p>
            <p><strong>Stadion:</strong> ${post.stadium}</p>
            <a class="readmore" href="${post.file}">Bericht lesen →</a>
        </section>
    `;
});
</script>

</body>
</html>
